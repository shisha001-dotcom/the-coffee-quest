<!DOCTYPE html>
<html lang="vi">
<head>

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>

  <title>The Coffee Quest</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/chat.css">

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>

</head>

<body>

<!-- HEADER -->
<header class="site-header">

  <button id="menu-toggle">☰</button>

  <a class="logo" onclick="loadPage('news')">
    🎲 <span>The Coffee</span>Quest
  </a>

  <div class="search-wrap" id="header-search">

    <input
      type="text"
      id="searchInput"
      placeholder="Tìm tên board game…"
      autocomplete="off"
    />

    <div class="search-icon">🔍</div>

  </div>

  <div class="header-count" id="header-count-wrap">
    Hiển thị <b id="countNum">0</b> game
  </div>

</header>

<!-- SIDE MENU -->
<div id="side-menu">

  <div class="menu-header">
    <h2>THE COFFEE QUEST</h2>
  </div>

  <div class="menu-item" onclick="loadPage('news')">
    📰 Tin tức - Daily Quest
  </div>

  <div class="menu-item" onclick="loadPage('boardgame')">
    🎲 Luật boardgame
  </div>

  <div class="menu-item" onclick="loadPage('contact')">
    ☕ Thông tin liên hệ
  </div>

  <div class="menu-item" onclick="loadPage('settings')">
    ⚙️ Cài đặt cá nhân
  </div>

</div>

<div id="menu-overlay"></div>

<!-- PAGE CONTENT -->
<div id="app"></div>

<!-- CHAT -->
<button id="chat-toggle">💬</button>

<div id="chat-window">
  <div class="chat-header">

    <div class="chat-title">
      <div class="online-dot"></div>
      <h3>Cộng đồng</h3>
    </div>

    <button id="chat-close">✕</button>

  </div>

  <div class="chat-online">
    👥 Đang online: <span id="online-count">0</span> người
  </div>

  <div id="chat-messages"></div>

  <div class="chat-input-wrap">
    <input type="text" id="chat-input" placeholder="Nhập tin nhắn..."/>
    <button id="chat-send">Gửi</button>
  </div>

</div>

<!-- SCRIPTS -->
<script src="js/data.js"></script>
<script src="js/router.js"></script>
<script src="js/app.js"></script>
<script type="module" src="js/chat.js"></script>

</body>
</html>
