<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>The Coffee Quest</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/chat.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>

<!-- ══ HEADER ══ -->
<header class="site-header">
  <button id="menu-toggle">☰</button>
  <a class="logo" onclick="goNews()">☕ <span>The Coffee</span>Quest</a>
  <div class="search-wrap" id="header-search" style="display:none">
    <input type="text" id="searchInput" placeholder="Tìm board game…" autocomplete="off"/>
    <div class="search-icon">🔍</div>
  </div>
  <div class="header-count" id="header-count-wrap" style="display:none">
    Hiển thị <b id="countNum">0</b> game
  </div>
</header>

<!-- ══ SIDE MENU ══ -->
<div id="side-menu">
  <div class="menu-header">
    <div class="menu-logo">☕</div>
    <div>
      <div class="menu-title">The Coffee Quest</div>
      <div class="menu-sub">Coffee &amp; Boardgame</div>
    </div>
  </div>
  <div class="menu-item" onclick="goNews()">📰 Tin tức - Daily Quest</div>
  <div class="menu-item" onclick="goBoardgame()">🎲 Luật Boardgame</div>
  <div class="menu-item" onclick="goContact()">📍 Thông tin liên hệ</div>
  <div class="menu-item" onclick="goSettings()">⚙️ Cài đặt cá nhân</div>
</div>
<div id="menu-overlay"></div>

<!-- ══ PAGE CONTENT ══ -->
<div id="app"></div>

<!-- ══ LIGHTBOX ══ -->
<div id="lightbox">
  <button id="lb-close" onclick="closeLb()">✕</button>
  <img id="lb-img" src="" alt=""/>
  <div id="lb-caption"></div>
</div>

<!-- ══ USERNAME MODAL ══ -->
<div id="username-modal">
  <div class="username-card">
    <div class="username-logo">💬</div>
    <h2>Tên của bạn là gì?</h2>
    <p>Nhập tên để tham gia chat cộng đồng</p>
    <input type="text" id="username-input" placeholder="Nhập tên..." maxlength="30"/>
    <button id="username-save">Bắt đầu ☕</button>
  </div>
</div>

<!-- ══ CHAT ══ -->
<button id="chat-toggle">💬</button>
<div id="chat-window">
  <div class="chat-header">
    <div class="chat-title">
      <div class="online-dot"></div>
      <h3>Cộng đồng</h3>
    </div>
    <button id="chat-close">✕</button>
  </div>
  <div class="chat-online">👥 Đang online: <span id="online-count">0</span> người</div>
  <div id="chat-messages"></div>
  <div class="chat-input-wrap">
    <input type="text" id="chat-input" placeholder="Nhập tin nhắn..."/>
    <button id="chat-send">Gửi</button>
  </div>
</div>

<!-- ══ SCRIPTS — thứ tự quan trọng ══ -->
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script type="module" src="js/chat.js"></script>

</body>
</html>
